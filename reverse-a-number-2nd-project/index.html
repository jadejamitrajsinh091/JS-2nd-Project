  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse a Number - Cyber Theme</title>
</head>
<body>

  <div class="bg-pattern">
    <span class="p1">9</span>
    <span class="p2">4</span>
    <span class="p3">2</span>
  </div>

  <form class="card" id="reverseForm">
    <h1 class="heading">Reverse a Number</h1>
    <p class="subtitle">Enter any number, and get its reverse instantly.</p>

    <div class="input-group">
      <input type="number" id="numInput" placeholder="Enter Number (e.g., 123)" autocomplete="off">
    </div>

    <button type="button" id="reverseBtn" onclick="reverseNum()">Reverse Now</button>

    <p id="resultDisplay">Reverse = <span id="reversedResult"></span></p>
  </form>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
